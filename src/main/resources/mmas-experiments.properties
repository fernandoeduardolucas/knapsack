# -----------------------------------------------------------------------------
# Configuração de experiências para MAX-MIN Ant System (MMAS)
# Trabalho prático: variar parâmetros e comparar performance.
#
# Cada propriedade abaixo aceita UMA lista separada por vírgulas.
# O runner executa o produto cartesiano de todas as listas.
# -----------------------------------------------------------------------------

# Para correr TODAS as instâncias da pasta, use mmas.instances.dir
mmas.instances.dir=docs/inst_test/instancias

# Opcional: lista explícita de instâncias (quando definido, tem prioridade sobre instances.dir)
# mmas.instances=docs/inst_test/instancias/n_1000_1,docs/inst_test/instancias/n_1000_2

# Número de formigas
mmas.ants=20,30,50

# Número de iterações
mmas.iterations=200,300,500

# Expoente da feromona
mmas.alpha=0.8,1.0,1.2

# Expoente da heurística
mmas.beta=2.0,3.0,4.0

# Taxa de evaporação
mmas.rho=0.1,0.2,0.3

# Intensidade de depósito
mmas.q=0.5,1.0,2.0

# Limite de iterações sem melhoria (reinício de feromona)
mmas.stall.limit=50,80,120

# Sementes para reprodutibilidade
mmas.seed=42,123,2026

# Caminho do CSV de saída
mmas.output.csv=results/mmas-grid-results.csv
