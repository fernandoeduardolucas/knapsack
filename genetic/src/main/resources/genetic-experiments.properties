# -----------------------------------------------------------------------------
# Configuracao de experiencias para Algoritmo Genetico (AG)
# Trabalho pratico: variar parametros e comparar performance.
#
# Cada propriedade abaixo aceita UMA lista separada por virgulas.
# Um runner de experiencias deve executar o produto cartesiano de todas as listas.
#
# Nomes de propriedades alinhados aos argumentos atuais do GeneticKnapsack:
# - --population / --generations
# - --crossover / --mutation
# - --elite / --tournament
# - --stagnation / --seed
# -----------------------------------------------------------------------------

# Para correr TODAS as instancias da pasta, use genetic.instances.dir
genetic.instances.dir=docs/inst_test/instancias

# Opcional: lista explicita de instancias (quando definido, tem prioridade sobre instances.dir)
# genetic.instances=docs/inst_test/instancias/n_1000_1,docs/inst_test/instancias/n_1000_2

# Tamanho da populacao
# genetic.population=50,100,200
genetic.population=30,50,80

# Numero maximo de geracoes
# genetic.generations=500,1000,2000
genetic.generations=100,300,500

# Taxa de cruzamento (crossover)
genetic.crossover=0.75,0.85,0.95

# Taxa de mutacao (bit-flip)
genetic.mutation=0.001,0.005,0.01

# Numero de individuos preservados por elitismo
genetic.elite=1,3,5

# Tamanho do torneio para selecao
genetic.tournament=2,3,5

# Limite de geracoes sem melhoria (paragem por estagnacao)
# genetic.stagnation=50,100,200
genetic.stagnation=20,50,100

# Sementes para reprodutibilidade
# genetic.seed=42,123,2026
genetic.seed=4,12,202

# Numero de threads para executar a grelha em paralelo
genetic.parallelism=1

# Caminho do CSV base de saida; os relatorios ga-grid-results.csv,
# ga-detailed-results.csv e ga-relatorio.md sao gerados na mesma pasta.
genetic.output.csv=results/genetic/ag_resultados.csv
