# -----------------------------------------------------------------------------
# Configuração de experiências para Tabu Search (TS)
# Trabalho prático: variar parâmetros e comparar performance.
#
# Cada propriedade abaixo aceita UMA lista separada por vírgulas.
# O runner executa o produto cartesiano de todas as listas.
# -----------------------------------------------------------------------------

# Para correr TODAS as instâncias da pasta, use ts.instances.dir
ts.instances.dir=docs/inst_test/instancias

# Opcional: lista explícita de instâncias (quando definido, tem prioridade sobre instances.dir)
# ts.instances=docs/inst_test/instancias/n_1000_1,docs/inst_test/instancias/n_1000_2

# Número de iterações do Tabu Search
# ts.iterations=1000,3000,5000
ts.iterations=100,300,500

# Tenure do flip (tamanho da lista tabu para movimentos flip)
ts.tenure.flip=10,15,20

# Tenure do swap (tamanho da lista tabu para movimentos swap)
ts.tenure.swap=7,10,15

# Limite de iterações sem melhoria (antes de diversificação)
# ts.stall.limit=50,100,200
ts.stall.limit=5,10,20

# Força da diversificação (fração de itens perturbados)
ts.diversify.strength=0.1,0.2,0.3

# Sementes para reprodutibilidade
# ts.seed=42,123,2026
ts.seed=4,12,202

# Número de threads para executar a grelha em paralelo
ts.parallelism=8

# Caminho do CSV de saída
ts.output.csv=results/tabu/ts-grid-results.csv
