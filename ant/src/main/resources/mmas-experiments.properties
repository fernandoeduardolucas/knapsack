# -----------------------------------------------------------------------------
# Configuracao de experiencias para MAX-MIN Ant System (MMAS)
# Nomes de propriedades alinhados ao documento:
# - numero de formigas (m)
# - numero de ciclos
# - alpha/beta/rho
# - ciclos sem melhoria (estagnacao)
#
# Nota: o runner continua a aceitar os nomes legacy (mmas.ants, mmas.iterations,
# mmas.alpha, ...) para retrocompatibilidade.
# -----------------------------------------------------------------------------

# Para correr TODAS as instancias da pasta, use mmas.instancias.dir
mmas.instancias.dir=docs/inst_test/instancias

# Opcional: lista explicita de instancias (quando definido, tem prioridade sobre instancias.dir)
# mmas.instancias=docs/inst_test/instancias/n_1000_1,docs/inst_test/instancias/n_1000_2

# Numero de formigas (m)
# mmas.numero.formigas=20,30,50
mmas.numero.formigas=2,3,5

# Numero de ciclos (iteracoes)
# mmas.numero.ciclos=200,300,500
mmas.numero.ciclos=2,3,5

# alpha = peso da feromona
mmas.peso.feromona=0.8,1.0,1.2

# beta = peso da heuristica
mmas.peso.heuristica=2.0,3.0,4.0

# rho = taxa de evaporacao
mmas.taxa.evaporacao=0.1,0.2,0.3

# Intensidade de deposito (q)
mmas.intensidade.deposito=0.5,1.0,2.0

# Ciclos sem melhoria (reinicio de feromona)
# mmas.ciclos.sem.melhoria=50,80,120
mmas.ciclos.sem.melhoria=5,8,12

# Sementes para reprodutibilidade
# mmas.semente=42,123,2026
mmas.semente=4,12,202

# Numero de threads para executar a grelha em paralelo
mmas.paralelismo=8

# Caminho do CSV de saida
mmas.saida.csv=results/ant/mmas-grid-results.csv

# Caminho do relatorio detalhado (melhor resultado por instancia)
mmas.saida.relatorio=results/ant/mmas-detailed-results.csv
