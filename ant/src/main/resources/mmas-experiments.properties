# -----------------------------------------------------------------------------
# Configuracao de experiencias para MAX-MIN Ant System (MMAS)
# Trabalho pratico: variar parametros e comparar performance.
#
# Cada propriedade abaixo aceita UMA lista separada por virgulas.
# O runner executa o produto cartesiano de todas as listas.
# -----------------------------------------------------------------------------

# Para correr TODAS as instancias da pasta, use mmas.instances.dir
mmas.instances.dir=docs/inst_test/instancias

# Opcional: lista explicita de instancias (quando definido, tem prioridade sobre instances.dir)
# mmas.instances=docs/inst_test/instancias/n_1000_1,docs/inst_test/instancias/n_1000_2

# Numero de formigas
# mmas.ants=20,30,50
mmas.ants=2,3,5

# Numero de iteracoes
# mmas.iterations=200,300,500
mmas.iterations=2,3,5

# Expoente da feromona
mmas.alpha=0.8,1.0,1.2

# Expoente da heuristica
mmas.beta=2.0,3.0,4.0

# Taxa de evaporacao
mmas.rho=0.1,0.2,0.3

# Intensidade de deposito
mmas.q=0.5,1.0,2.0

# Limite de iteracoes sem melhoria (reinicio de feromona)
# mmas.stall.limit=50,80,120
mmas.stall.limit=5,8,12

# Sementes para reprodutibilidade
# mmas.seed=42,123,2026
mmas.seed=4,12,202

# Numero de threads para executar a grelha em paralelo
mmas.parallelism=8

# Caminho do CSV de saida
mmas.output.csv=results/ant/mmas-grid-results.csv